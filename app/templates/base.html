<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Price Sync{% endblock %} | Jobber</title>
    <link rel="stylesheet" href="https://unpkg.com/@jobber/design@0.90.1/dist/foundation.css" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/@jobber/design@0.90.1/dist/semantic.css" crossorigin="">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 0;
            background: var(--color-surface--background);
            color: var(--color-text);
            font-family: var(--typography--fontFamily-normal);
            font-size: var(--typography--fontSize-base);
            line-height: var(--typography--lineHeight-larger);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page {
            width: 100%;
            max-width: 680px;
            padding: var(--space-large) var(--space-base);
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-base);
            margin-bottom: var(--space-larger);
            padding-bottom: var(--space-base);
            border-bottom: 1px solid var(--color-border);
        }
        .header__title {
            font-family: var(--typography--fontFamily-display);
            font-size: var(--typography--fontSize-largest);
            font-weight: 700;
            color: var(--color-heading);
            margin: 0;
            letter-spacing: -0.02em;
        }
        .header__back {
            font-size: var(--typography--fontSize-small);
            color: var(--color-text--secondary);
            text-decoration: none;
            transition: color var(--timing-base);
        }
        .header__back:hover {
            color: var(--color-interactive);
            text-decoration: none;
        }
        .hero {
            margin-bottom: var(--space-large);
        }
        .hero__title {
            font-family: var(--typography--fontFamily-display);
            font-size: var(--typography--fontSize-largest);
            font-weight: 700;
            color: var(--color-heading);
            margin: 0 0 var(--space-small);
            letter-spacing: -0.02em;
        }
        .hero__subtitle {
            color: var(--color-text--secondary);
            font-size: var(--typography--fontSize-base);
            margin: 0;
            line-height: var(--typography--lineHeight-larger);
        }
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-base);
            padding: var(--space-large);
            margin-bottom: var(--space-base);
            box-shadow: var(--shadow-base);
            border: 1px solid var(--color-border);
            transition: box-shadow var(--timing-base);
        }
        .card:focus-within {
            box-shadow: var(--shadow-high);
        }
        .card--highlight {
            border-color: var(--color-interactive--subtle);
            background: linear-gradient(to bottom, var(--color-surface) 0%, var(--color-surface--background--subtle) 100%);
        }
        .card__title {
            font-size: var(--typography--fontSize-large);
            font-weight: 600;
            color: var(--color-heading);
            margin: 0 0 var(--space-small);
        }
        .muted {
            color: var(--color-text--secondary);
            font-size: var(--typography--fontSize-small);
            line-height: var(--typography--lineHeight-larger);
        }
        a {
            color: var(--color-interactive);
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
        code {
            font-size: 0.9em;
            padding: 2px 6px;
            background: var(--color-surface--background);
            border-radius: var(--radius-small);
            color: var(--color-text);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-small);
            background: var(--color-interactive);
            color: var(--color-text--reverse);
            padding: var(--space-slim) var(--space-large);
            border-radius: var(--radius-small);
            border: none;
            cursor: pointer;
            font-size: var(--typography--fontSize-base);
            font-family: inherit;
            font-weight: 500;
            transition: background var(--timing-base), transform var(--timing-quick);
        }
        .btn:hover {
            background: var(--color-interactive--hover);
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn--subtle {
            background: var(--color-interactive--subtle);
            color: var(--color-text--reverse);
        }
        .btn--subtle:hover {
            background: var(--color-interactive--subtle--hover);
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-small);
            margin-top: var(--space-base);
        }
        .form-group {
            margin-bottom: var(--space-base);
        }
        .form-group label {
            display: block;
            margin-bottom: var(--space-smaller);
            font-weight: 500;
            color: var(--color-text);
            font-size: var(--typography--fontSize-base);
        }
        .form-options {
            background: var(--color-surface--background--subtle);
            border-radius: var(--radius-small);
            padding: var(--space-base);
            margin: var(--space-base) 0;
        }
        .form-options .form-group {
            margin-bottom: var(--space-slim);
        }
        .form-options .form-group:last-child { margin-bottom: 0; }
        input[type="file"] {
            font-size: var(--typography--fontSize-small);
            color: var(--color-text);
            padding: var(--space-small);
            border: 1px dashed var(--color-border);
            border-radius: var(--radius-small);
            background: var(--color-surface);
            width: 100%;
            max-width: 400px;
        }
        input[type="file"]:focus {
            outline: none;
            border-color: var(--color-focus);
            box-shadow: 0 0 0 2px var(--color-focus);
        }
        input[type="number"] {
            width: 5rem;
            padding: var(--space-small) var(--space-slim);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-small);
            font-size: var(--typography--fontSize-base);
        }
        input[type="number"]:focus {
            outline: none;
            border-color: var(--color-focus);
        }
        label input[type="checkbox"] {
            margin-right: var(--space-small);
            accent-color: var(--color-interactive);
        }
        .sync-result {
            margin-top: var(--space-base);
            padding: var(--space-base);
            border-radius: var(--radius-small);
            font-size: var(--typography--fontSize-base);
        }
        .sync-result.success {
            background: var(--color-success--surface);
            color: var(--color-success--onSurface);
            border: 1px solid var(--color-success);
        }
        .sync-result.error {
            background: var(--color-critical--surface);
            color: var(--color-critical--onSurface);
            border: 1px solid var(--color-critical);
        }
        .sync-result .skus-list {
            font-size: var(--typography--fontSize-small);
            margin-top: var(--space-small);
            max-height: 140px;
            overflow-y: auto;
            padding-left: var(--space-base);
        }
        .sync-result .skus-list span { display: inline; }
        .footer {
            margin-top: var(--space-larger);
            padding-top: var(--space-base);
            border-top: 1px solid var(--color-border);
            font-size: var(--typography--fontSize-small);
            color: var(--color-text--secondary);
        }
        .footer a { color: var(--color-text--secondary); }
        .footer a:hover { color: var(--color-interactive); }
        .alert {
            border-left: 4px solid var(--color-critical);
            padding-left: var(--space-base);
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: var(--radius-small);
            font-size: var(--typography--fontSize-smaller);
            font-weight: 500;
            background: var(--color-success--surface);
            color: var(--color-success--onSurface);
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="page container">
        <header class="header">
            <h1 class="header__title">Price Sync</h1>
            {% block header_extra %}{% endblock %}
        </header>
        <main class="hero">
            {% block content %}{% endblock %}
        </main>
        <footer class="footer">
            {% block footer %}
            <a href="{{ base_url|default('') }}/health">Health check</a>
            {% endblock %}
        </footer>
    </div>
</body>
</html>
